name: CI — Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────
  # Backend — pytest (Django + PostgreSQL)
  # ───────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: versiona
          POSTGRES_PASSWORD: versiona-ci
          POSTGRES_DB: versiona
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U versiona"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: minio/minio:edge-cicd
        env:
          MINIO_ROOT_USER: versiona-minio
          MINIO_ROOT_PASSWORD: versiona-minio-ci
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_NAME: versiona
      DB_USER: versiona
      DB_PASSWORD: versiona-ci
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      REDIS_URL: redis://127.0.0.1:6379/1
      CELERY_TASK_ALWAYS_EAGER: '1'
      DJANGO_SECRET_KEY: ci-only-secret
      AWS_S3_ENDPOINT_URL: http://127.0.0.1:9000
      AWS_ACCESS_KEY_ID: versiona-minio
      AWS_SECRET_ACCESS_KEY: versiona-minio-ci
      AWS_STORAGE_BUCKET_NAME: versiona-media

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (for ast-parser tests)
        working-directory: frontend
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create MinIO bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set ci http://127.0.0.1:9000 versiona-minio versiona-minio-ci
          mc mb --ignore-existing ci/versiona-media

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run pytest with coverage
        run: pytest -v --tb=short --junitxml=pytest-results.xml --cov=accounts --cov=core --cov=orgs --cov=projects --cov=documents --cov=engine --cov=comparisons --cov=audit --cov=versiona_project --cov-branch --cov-report=json:coverage-backend.json --cov-report=xml:coverage-backend.xml

      - name: Engine module coverage gate (95% on the D5 ground)
        run: python3 "$GITHUB_WORKSPACE/scripts/ci/coverage-module-gate.py" coverage-backend.json >> "$GITHUB_STEP_SUMMARY"

      - name: Backend coverage summary
        if: always()
        run: python3 "$GITHUB_WORKSPACE/scripts/ci/backend-job-summary.py" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: |
            backend/coverage-backend.json
            backend/pytest-results.xml
          retention-days: 5

  # ───────────────────────────────────────────
  # Frontend — Jest unit & component tests
  # ───────────────────────────────────────────
  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run Jest tests with coverage
        run: |
          NODE_OPTIONS='--no-deprecation' npx jest --config jest.config.cjs --coverage --ci --forceExit --json --outputFile=jest-results.json || true
          node scripts/coverage-summary.cjs
          # Fail the step if tests failed
          node -e "const r=require('./jest-results.json'); if(!r.success) process.exit(1);"

      - name: Copy test results alongside coverage
        if: always()
        run: cp jest-results.json coverage/ 2>/dev/null || true

      - name: Frontend unit coverage summary
        if: always()
        run: node "$GITHUB_WORKSPACE/scripts/ci/frontend-job-summary.cjs" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload frontend-unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-unit
          path: |
            frontend/coverage/coverage-summary.json
            frontend/coverage/jest-results.json
          retention-days: 5

  # ───────────────────────────────────────────
  # Frontend — Playwright E2E tests
  # ───────────────────────────────────────────
  frontend-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: versiona
          POSTGRES_PASSWORD: versiona-ci
          POSTGRES_DB: versiona
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U versiona"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: minio/minio:edge-cicd
        env:
          MINIO_ROOT_USER: versiona-minio
          MINIO_ROOT_PASSWORD: versiona-minio-ci
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_NAME: versiona
      DB_USER: versiona
      DB_PASSWORD: versiona-ci
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      REDIS_URL: redis://127.0.0.1:6379/1
      CELERY_TASK_ALWAYS_EAGER: '1'
      DJANGO_SECRET_KEY: ci-only-secret
      AWS_S3_ENDPOINT_URL: http://127.0.0.1:9000
      AWS_ACCESS_KEY_ID: versiona-minio
      AWS_SECRET_ACCESS_KEY: versiona-minio-ci
      AWS_STORAGE_BUCKET_NAME: versiona-media

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Create backend venv and install deps
        working-directory: backend
        run: |
          python -m venv venv
          venv/bin/pip install -r requirements.txt

      - name: Create MinIO bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set ci http://127.0.0.1:9000 versiona-minio versiona-minio-ci
          mc mb --ignore-existing ci/versiona-media

      - name: Run backend migrations
        working-directory: backend
        run: venv/bin/python manage.py migrate --no-input

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers with system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter='json,./e2e/reporters/flow-coverage-reporter.mjs'
        env:
          CI: 'true'
          PLAYWRIGHT_JSON_OUTPUT_NAME: e2e-results/playwright-results.json

      - name: Upload E2E flow coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-e2e
          path: |
            frontend/e2e-results/flow-coverage.json
            frontend/e2e-results/playwright-results.json
          retention-days: 5

      - name: Upload test traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ───────────────────────────────────────────
  # Coverage Summary — aggregates all reports
  # ───────────────────────────────────────────
  coverage-summary:
    if: always()
    needs: [backend-tests, frontend-unit-tests, frontend-e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: coverage-artifacts/backend
        continue-on-error: true

      - name: Download frontend-unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend-unit
          path: coverage-artifacts/frontend-unit
        continue-on-error: true

      - name: Download frontend-e2e coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend-e2e
          path: coverage-artifacts/frontend-e2e
        continue-on-error: true

      - name: Generate coverage summary
        if: always()
        id: summary
        run: node scripts/coverage-summary-ci.cjs

      - name: Write Job Summary
        run: cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report (md)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-md
          path: coverage-report.md
          retention-days: 5

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage-report.md
