[pytest]
DJANGO_SETTINGS_MODULE = versiona_project.settings
python_files = test_*.py tests.py
testpaths =
    accounts/tests
    core/tests
    orgs/tests
    projects/tests
    documents/tests
    comparisons/tests
    reviews/tests
    notifications/tests
    observations/tests
    checks/tests
    engine/tests
norecursedirs =
    venv
markers =
    escenario(id): id de escenario de docs/audit/03-mapa-flujos.md (trazabilidad 04)
addopts = -ra --cov=accounts --cov=core --cov=orgs --cov=projects --cov=documents --cov=engine --cov=comparisons --cov=reviews --cov=notifications --cov=observations --cov=checks --cov=versiona_project --cov-report= --cov-fail-under=80
